name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: tukayev.it.com
          username: tukabpyj
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            echo "Checking directory..."
            cd /home/tukabpyj/repositories/3droof || exit 1
            echo "Pulling code..."
            git pull origin main || exit 1
            echo "Installing dependencies..."
            /usr/local/bin/npm install --production || exit 1
            echo "Restarting app..."
            mkdir -p tmp && touch tmp/restart.txt
