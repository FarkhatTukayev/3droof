name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: tukayev.it.com
          username: tukabpyj
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 21098
          script: |
            cd /home/tukabpyj/repositories/3droof
            ssh-agent bash -c 'ssh-add ~/.ssh/id_rsa; git pull origin main'
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt
